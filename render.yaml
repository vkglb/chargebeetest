# Render Blueprint — provisions the whole platform in one click.
# In Render: New → Blueprint → pick this repo. It reads this file.
#
# Creates: a Postgres database, the Go API web service, and the React dashboard
# as a static site. After the first deploy, set the two cross-URLs noted below.

databases:
  - name: chargeebee-db
    databaseName: chargeebee
    user: chargeebee
    plan: free
    region: virginia

services:
  # ── Go API ────────────────────────────────────────────────
  - type: web
    name: chargeebee-api
    runtime: go
    rootDir: backend
    plan: free
    region: virginia
    branch: main
    autoDeploy: true # deploy automatically on every push to main
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/api
    startCommand: ./app
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chargeebee-db
          property: connectionString
      - key: AUTO_MIGRATE
        value: "true" # creates all tables on first boot
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*" # tighten to the dashboard URL after first deploy
      - key: CHECKOUT_BASE_URL
        sync: false # set to the dashboard static-site URL
      - key: STRIPE_SECRET_KEY
        sync: false # optional until you charge real cards
      - key: SENDGRID_API_KEY
        sync: false # optional

  # ── React dashboard (static) ──────────────────────────────
  - type: web
    name: chargeebee-dashboard
    runtime: static
    rootDir: frontend
    branch: main
    autoDeploy: true # deploy automatically on every push to main
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false # set to the chargeebee-api URL (https://chargeebee-api.onrender.com)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
