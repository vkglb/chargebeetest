# Full stack for any Docker host. Values come from a root .env (optional) via
# ${VAR:-default} interpolation, so `docker compose up --build` works out of the
# box and is easy to override per environment.
services:
  postgres:
    image: postgres:15-alpine
    container_name: chargeebee_postgres
    environment:
      POSTGRES_USER: chargeebee
      POSTGRES_PASSWORD: chargeebee
      POSTGRES_DB: chargeebee
    ports:
      - "5432:5432"
    volumes:
      - chargeebee_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chargeebee"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot migration runner. Runs `migrate up` then exits.
  #   docker compose run --rm migrate          # apply all migrations
  #   docker compose run --rm migrate status   # show status
  #   docker compose run --rm migrate down     # roll back last
  migrate:
    image: chargeebee-backend
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/migrate"]
    command: ["up"]
    environment:
      DATABASE_URL: postgres://chargeebee:chargeebee@postgres:5432/chargeebee?sslmode=disable
    restart: "no"

  api:
    image: chargeebee-backend
    build: ./backend
    container_name: chargeebee_api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Inside the compose network, Postgres is reachable at host "postgres".
      DATABASE_URL: postgres://chargeebee:chargeebee@postgres:5432/chargeebee?sslmode=disable
      AUTO_MIGRATE: "false" # the migrate service already applied them
      PORT: "8080"
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      CHECKOUT_BASE_URL: ${CHECKOUT_BASE_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
    ports:
      - "8080:8080"

volumes:
  chargeebee_pgdata:
